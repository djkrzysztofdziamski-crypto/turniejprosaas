# admin.turniejomat.pl — SPA rewrite
# viewMode=admin ustawia index.html po hostname (bez ?view= w URL)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["admin.turniejomat.pl"]}

# demo.turniejomat.pl — Demo Story (SPA rewrite, auto-start w index.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["demo.turniejomat.pl"]}

# domena główna — SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
