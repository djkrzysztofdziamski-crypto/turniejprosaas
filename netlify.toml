# TurniejPro SaaS — deploy aplikacji (NIE landing turniejomat.pl)
# Hosty: app.turniejomat.pl | demo.turniejomat.pl | admin.turniejomat.pl
# Landing marketingowy: osobny folder landing/ → osobny site Netlify

# app.turniejomat.pl — bramka logowania + panel turnieju
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["app.turniejomat.pl"]}

# admin.turniejomat.pl — panel administratora
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["admin.turniejomat.pl"]}

# demo.turniejomat.pl — Demo Story (auto-start E0)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Host = ["demo.turniejomat.pl"]}

# Przekierowania legacy (gdy stary link trafia na deploy aplikacji)
[[redirects]]
  from = "/*"
  to = "https://demo.turniejomat.pl/:splat"
  status = 302
  conditions = {Query = {demo = "story"}}

[[redirects]]
  from = "/*"
  to = "https://admin.turniejomat.pl/:splat"
  status = 302
  conditions = {Query = {view = "admin"}}

# Fallback — podgląd netlify.app i subdomeny dev
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
